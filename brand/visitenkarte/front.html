<!doctype html><html><head><meta charset="utf-8"><style>
@font-face{font-family:'Archivo';font-weight:600;src:url('archivo-600.woff2') format('woff2')}
*{margin:0;padding:0;box-sizing:border-box}
html,body{margin:0}
/* 1075x720 px = 91x61 mm @ 300dpi (85x55 mm + 3 mm Beschnitt) */
.card{width:1075px;height:720px;background:#FAF6EF;overflow:hidden;position:relative;font-family:'Archivo',sans-serif}
.inner{position:absolute;top:46px;left:42px;right:42px;bottom:50px;
       display:flex;flex-direction:column;align-items:center;justify-content:center;gap:46px}
.emblem{width:1000px;height:auto;display:block}
.claim{color:#22242A;font-weight:600;font-size:57px;line-height:1.12;text-align:center;letter-spacing:.3px}
.claim .hl{color:#C1121C}
</style></head><body>
<div class="card"><div class="inner">
  <img class="emblem" src="emblem-velo-card.png" alt="">
  <div class="claim">Der <span class="hl">Notstromer</span> für<br>Berner Elektrikerfirmen</div>
</div></div>
</body></html>
