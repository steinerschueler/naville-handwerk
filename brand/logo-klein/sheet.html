<!doctype html><meta charset="utf-8">
<style>
  body{margin:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;background:#fff;color:#22242A}
  h3{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#6E6B64;margin:0 0 10px}
  .row{display:flex;gap:26px;align-items:flex-end;padding:22px 26px;flex-wrap:wrap}
  .cell{text-align:center}
  .cap{font-size:12px;color:#6E6B64;margin-top:8px}
  .bar{padding:20px 26px;display:flex;gap:20px;align-items:center}
  .bar.dark{background:#22242A}
  .bar.dark .cap{color:#b9b3a7}
  .bar.grey{background:#d9d9d9}
  img{display:block;image-rendering:auto}
  .sec{border-top:1px solid #DCD6CB}
</style>
<div class="row">
  <div class="cell"><img src="v1_paper.svg" width="128" height="128"><div class="cap">v1 · Papier</div></div>
  <div class="cell"><img src="v2_white.svg" width="128" height="128"><div class="cap">v2 · Weiss</div></div>
  <div class="cell"><img src="v3_paper_redframe.svg" width="128" height="128"><div class="cap">v3 · Papier + roter Rahmen</div></div>
  <div class="cell"><img src="v4_paper_line.svg" width="128" height="128"><div class="cap">v4 · Papier + feine Linie</div></div>
</div>
<div class="sec"></div>
<div class="bar grey">
  <h3 style="margin:0 18px 0 0">Tab-Grössen (Papier)</h3>
  <div class="cell"><img src="v1_paper.svg" width="16" height="16"><div class="cap">16</div></div>
  <div class="cell"><img src="v1_paper.svg" width="24" height="24"><div class="cap">24</div></div>
  <div class="cell"><img src="v1_paper.svg" width="32" height="32"><div class="cap">32</div></div>
  <div class="cell"><img src="v1_paper.svg" width="48" height="48"><div class="cap">48</div></div>
  <div class="cell"><img src="v1_paper.svg" width="64" height="64"><div class="cap">64</div></div>
</div>
<div class="bar dark">
  <h3 style="margin:0 18px 0 0;color:#fff">Auf dunkel</h3>
  <div class="cell"><img src="v1_paper.svg" width="16" height="16"><div class="cap">16</div></div>
  <div class="cell"><img src="v1_paper.svg" width="32" height="32"><div class="cap">32</div></div>
  <div class="cell"><img src="v2_white.svg" width="32" height="32"><div class="cap">32 weiss</div></div>
  <div class="cell"><img src="v1_paper.svg" width="64" height="64"><div class="cap">64</div></div>
</div>
