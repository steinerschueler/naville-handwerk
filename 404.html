<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
<title>Seite nicht gefunden – Naville Handwerk GmbH</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
:root{--blau:#1F4E79;--akzent:#B9772E;--creme:#FAF6EF;--text:#33302B;--grau:#6b6357}
body{margin:0;font-family:"Segoe UI",Arial,Helvetica,sans-serif;background:var(--creme);color:var(--text);display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center;padding:20px}
.box{max-width:520px}
.code{font-size:4em;font-weight:bold;color:var(--blau);margin:0}
h1{color:var(--blau);font-size:1.4em;margin:6px 0 12px}
p{color:var(--grau);font-size:1.05em}
a{display:inline-block;margin-top:16px;background:var(--blau);color:#fff;text-decoration:none;font-weight:bold;padding:12px 22px;border-radius:10px}
</style>
</head>
<body>
<div class="box">
<p class="code">404</p>
<h1>Diese Seite gibt es nicht.</h1>
<p>Vielleicht hat sich ein Tippfehler eingeschlichen, oder die Seite ist umgezogen.</p>
<a href="/">Zur Startseite</a>
</div>
</body>
</html>
