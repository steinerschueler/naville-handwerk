<!doctype html><html lang="de"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
<title>Seite nicht gefunden – Naville Handwerk GmbH</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#EFEEE8">
<style>
@font-face{font-family:'Archivo';font-weight:600;font-display:swap;src:url(fonts/archivo-600.woff2) format('woff2');}
:root{--ink:#22242A;--ink2:#43423C;--paper:#EFEEE8;--red:#C1121C;--grey:#6E6B64;--line:#DCD6CB;}
*{box-sizing:border-box;margin:0}
body{font-family:"Segoe UI",system-ui,Arial,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.wire{height:4px;background:var(--red)}
.mid{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
.box{max-width:540px}
.err-logo{width:100%;max-width:300px;height:auto;margin:0 auto 26px;display:block}
.code{font-family:'Archivo',sans-serif;font-weight:600;font-size:clamp(56px,12vw,84px);line-height:1;color:var(--red);letter-spacing:-.02em;margin:0}
h1{font-family:'Archivo',sans-serif;font-weight:600;font-size:clamp(20px,3vw,26px);color:var(--ink);margin:8px 0 12px;letter-spacing:-.01em}
p{color:var(--ink2);font-size:16px;max-width:40ch;margin:0 auto}
.btn{display:inline-block;margin-top:24px;background:var(--red);color:#fff;text-decoration:none;font-weight:700;padding:14px 26px;border-radius:3px}
.foot{background:#22242A;color:#b9b3a7;text-align:center;padding:20px;font-size:14px}
.foot a{color:#eee}
.availbar{background:var(--paper);padding:11px 16px 3px;text-align:center}
.availbar[hidden]{display:none}
.availpill{display:inline-flex;align-items:center;gap:9px;border-radius:999px;padding:8px 18px;font-size:14px;line-height:1.3;color:#fff;text-decoration:none;font-weight:500;max-width:100%}
.availbar.av-off .availpill{background:var(--red)}
.availbar.av-on .availpill{background:#3E9E4E}
.availpill .av-ic{flex:none;width:18px;height:18px}
.availpill b{font-weight:700}
.availpill:hover{filter:brightness(1.07)}
</style>
</head>
<body>
<div class="availbar" id="availbar" hidden>
  <a class="availpill" href="index.html#kontakt">
    <svg class="av-ic" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="3" y="4.5" width="18" height="16.5" rx="3.2" stroke="#fff" stroke-width="2"/><path d="M3 9.5H21M8 2.5V6M16 2.5V6" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
    <span id="availtext">Verfügbarkeit wird geladen …</span>
  </a>
</div>
<div class="wire"></div>
<div class="mid">
  <div class="box">
    <img class="err-logo" src="logo/emblem-schwarzrot-transparent.png" alt="Naville Handwerk – Lastenvelo mit Anhänger und Firmenschild">
    <p class="code">404</p>
    <h1>Diese Seite gibt es nicht.</h1>
    <p>Vielleicht hat sich ein Tippfehler eingeschlichen, oder die Seite ist umgezogen.</p>
    <a class="btn" href="/">Zur Startseite</a>
  </div>
</div>
<footer class="foot">Naville Handwerk GmbH · 3005 Bern · <a href="mailto:info@naville-handwerk.ch">info@naville-handwerk.ch</a></footer>
<script src="verfuegbarkeit.js"></script>
<script src="banner.js"></script>
</body></html>
